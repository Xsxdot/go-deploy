# ./templates/docker-compose-deploy.yaml
steps:
  - name: Run Docker Compose
    type: docker_compose
    roles: ["${vars.role}"]
    with:
      project_name: "${vars.project_name}"
      compose_file: "${vars.compose_file}"
      registry: "${vars.registry}" # 仅用于注入 .env 的 DOCKER_REGISTRY 供私有库登录
      env_vars: 
        IMAGE: "${vars.full_image}"
        APP_PORT: "${vars.port}"
        ENV: "${env}"
      pull_always: ${vars.pull_always}
      timeout: "120s"

  # 当 vars.skip_http_check 为 true 时跳过。不想要 http_check 时在 variables 中设置 skip_http_check: "true"
  - name: Health Check
    type: http_check
    run_if: '"${vars.skip_http_check}" != "true"'
    roles: ["${vars.role}"]
    needs: [Run Docker Compose]
    with:
      url: "http://${host}:${vars.port}${vars.health_path}"
      expected_status: 200