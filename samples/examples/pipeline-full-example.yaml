# =============================================================================
# 五、完整配置字段参考
# =============================================================================
#
# Step 字段说明:
# ----------------
# name              string           步骤名称（唯一标识，必填）
# type              string           插件类型（必填）
# needs             []string         依赖的前置步骤名称（可选）
# roles             []string         目标角色组（可选，默认使用全局 roles）
# batch_size        int              并发批次大小（可选，默认全并发）
# retries           int              失败重试次数（可选，默认 0）
# retry_delay       string           重试间隔，如 "5s"、"1m"（可选）
# tolerate_failures string           容忍度："5%" 或 "2"（可选）
# with              map[string]any   插件参数（根据插件类型不同）
#
# 变量优先级:
# ----------
# 环境变量 > variables > globalVars
#
# 内置变量:
# --------
# ${version}        自动生成的版本号
# ${run_temp_dir}   引擎分配的隔离临时沙箱目录（每次 Run 唯一，执行结束后自动清理，适合组装产物、打包等）
# ${host}           当前主机路由 IP（优先 lanAddr）
# ${host.addr}      主机地址
# ${host.lanAddr}   主机内网地址
# ${host.publicAddr} 主机公网地址
# ${vars.xxx}       include 模板传入的变量
# ${env.VAR_NAME}   运行时从 os.Getenv 读取，敏感凭据专用，不落盘到 SQLite
#
# 插件类型汇总:
# ------------
# local_command     本地 Shell 命令执行
# remote_command    远程 SSH 命令执行
# transfer          文件传输（SFTP）
# archive           本地打包（tar.gz/zip）
# http_check        HTTP 健康检查探针
# systemd_check     Systemd 服务状态检查
# systemd_service   Systemd 服务配置下发（模板渲染、daemon-reload、enable、restart）
# docker_check      Docker 容器状态检查
# manual_approval   人工确认阀门
# symlink_switch    软链接原子切换
# release_pruner    版本目录清理
# backup_state      远程备份
# dns_record        DNS 记录管理
# nginx_config      Nginx 配置下发
# include           模板引用
#
# CLI 命令:
# --------
# deploy release -n <project> -f pipeline.yaml -i infra.yaml --bump patch
# deploy apply <project> [-v <version>] [--dry-run]   # --dry-run 预检模式，不执行真实 SSH
# deploy rollback <project> -v <version>
#
# 环境变量:
# --------
# DEPLOYFLOW_APPROVE=yes    自动通过人工审批
# ALIYUN_ACCESS_KEY          阿里云 AccessKey（配合 ${env.ALIYUN_ACCESS_KEY} 使用）
# ALIYUN_ACCESS_SECRET       阿里云 AccessSecret
# CLOUDFLARE_API_TOKEN       Cloudflare API Token

