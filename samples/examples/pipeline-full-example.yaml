# =============================================================================
# 七、多环境配置示例
# =============================================================================
# 建议为不同环境创建不同的配置文件：
#
# ├── pipelines/
# │   ├── pipeline.dev.yaml
# │   ├── pipeline.staging.yaml
# │   └── pipeline.prod.yaml
# ├── infra/
# │   ├── infra.dev.yaml
# │   ├── infra.staging.yaml
# │   └── infra.prod.yaml
# └── templates/
#     └── common-steps.yaml
#
# 开发环境:
# --------
# name: "my-app-dev"
# env: "development"
# variables:
#   debug: "true"
#   log_level: "debug"
#
# 生产环境:
# --------
# name: "my-app-prod"
# env: "production"
# variables:
#   debug: "false"
#   log_level: "warn"
#
# 使用时指定不同的配置文件:
# deploy release -n myapp -f pipelines/pipeline.prod.yaml -i infra/infra.prod.yaml